name: Fanvue Daily Scraper
 
on:
  schedule:
    - cron: '55 22 * * *'   # 22:55 UTC = 00:55 CET (01:55 летом) — конец дня
  workflow_dispatch:          # ручной запуск для теста
 
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install chromium --with-deps
 
      - name: Run scraper
        env:
          FANVUE_EMAIL:      ${{ secrets.FANVUE_EMAIL }}
          FANVUE_PASSWORD:   ${{ secrets.FANVUE_PASSWORD }}
          APPS_SCRIPT_URL:   ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_SECRET: ${{ secrets.APPS_SCRIPT_SECRET }}
        run: python scraper.py
